maintainers:
  - github: taotieren
# build_prefix: aur-repo-x86_64
pre_build_script: |
  update_pkgver_and_pkgrel(_G.newver)
post_build_script: |
  git_pkgbuild_commit()
  update_aur_repo()
update_on:
  - source: github
    github: hpmicro/hpm_manufacturing_tool
    use_latest_release: true
    include_regex: '^v[\d.]+$'
    prefix: v


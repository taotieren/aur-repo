maintainers:
  - github: taotieren
    email: admin@taotieren.com
# build_prefix: aur-repo-x86_64
pre_build_script: |
  aur_pre_build(maintainers=['phoepsilonix'])
  run_cmd(['curl', '-L', '-o', 'PKGBUILD', 'https://aur.archlinux.org/cgit/aur.git/plain/PKGBUILD?h=manjaro-asian-input-support'])

  run_cmd(['sed', '-i', 's/"fcitx-\$_pkgbase"/# "fcitx-\$_pkgbase"/', 'PKGBUILD'])
  run_cmd(['sed', '-i', 's/package_fcitx-input-support/_package_fcitx-input-support/', 'PKGBUILD'])

  run_cmd(['updpkgsums'])
post_build: aur_post_build
# repo_depends:
#   -
update_on:
  - source: aur
    aur: manjaro-asian-input-support
  # - alias: python

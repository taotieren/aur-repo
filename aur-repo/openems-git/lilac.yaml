maintainers:
  - github: taotieren
    email: admin@taotieren.com
build_prefix: aur-repo-x86_64
pre_build_script: |
  aur_pre_build(maintainers=['thasti', 'xiota'])
  add_makedepends(['python-csxcad', 'csxcad'])
  run_cmd(['curl', '-L', '-o', 'PKGBUILD', 'https://aur.archlinux.org/cgit/aur.git/plain/PKGBUILD?h=openems-git'])

  run_cmd(['sed', '-i', 's/^pkgname=.*/pkgname=(python-openems-git openems-git)/', 'PKGBUILD'])

  run_cmd(['sed', '-i', 's/^\[\[ "${_build_python::1}".*/\[\[ "${_build_python::1}" == "t" \]\]/', 'PKGBUILD'])

  run_cmd(['updpkgsums'])
post_build: aur_post_build
repo_depends:
  - csxcad-git
  - fparser-git
update_on:
  - source: aur
    aur: openems-git
  - alias: python

maintainers:
  - github: taotieren
    email: admin@taotieren.com
build_prefix: aur-repo-x86_64
pre_build_script: |
  update_pkgver_and_pkgrel(_G.newver)
post_build_script: |
  git_pkgbuild_commit()
  update_aur_repo()
repo_depends:
  - python-mcp
  - python-typechat-git
  - python-pynng
update_on:
  - source: github
    github: Huaqiu-Electronics/kicad-mcp
    use_max_tag: true
    # use_latest_release: true
    prefix: v
  - alias: python

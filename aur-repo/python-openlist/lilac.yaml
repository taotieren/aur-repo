maintainers:
  - github: taotieren
    email: admin@taotieren.com
pre_build_script: |
  update_pkgver_and_pkgrel(_G.newver)
post_build_script: |
  git_pkgbuild_commit()
  update_aur_repo()
repo_depends:
  - python-aiofile
  - python-dictattr
  - python-download
  - python-filewrap
  - python-errno2
  - python-glob-pattern
  - python-httpfile
  - python-http-request
  - python-http-response
  - python-httpx-request
  - python-iterutils
  - python-property
  - python-undefined

update_on:
  - source: pypi
    pypi: python-openlist
  - alias: python

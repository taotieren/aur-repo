maintainers:
  - github: taotieren
    email: admin@taotieren.com

pre_build_script: |
  oldver, oldrel = get_pkgver_and_pkgrel()
  for line in edit_file('PKGBUILD'):
    if line.startswith('_tagname='):
      line = f"_tagname={_G.newver}"
    print(line)
  newver, newrel = get_pkgver_and_pkgrel()
  update_pkgrel(1 if newver != oldver else None)
  run_protected(["updpkgsums"])

post_build_script: |
  git_pkgbuild_commit()
  update_aur_repo()

update_on:
  - source: cmd
    cmd: |
      python3 << 'PYEOF'
      import urllib.request, re

      req = urllib.request.Request(
          "https://img.wanwang.xin/pubsf/10287/10287325/cdn-static-pages/pages/pc/1519083_zh-cn.html.Body.js",
          headers={"User-Agent": "Mozilla/5.0", "Referer": "https://www.stcai.com/"},
      )
      data = urllib.request.urlopen(req).read().decode()
      vers = re.findall(r"AiCube-ISP-v([\w.\-]+)\.zip", data)
      # keep the main release line (e.g. 6.96Z, 6.96Z.1) and skip "-plus" variants
      vers = [v for v in vers if re.match(r"^\d+\.\d+[A-Za-z]?(\.\d+)?$", v)]

      def parse(v):
          m = re.match(r"(\d+)\.(\d+)([A-Za-z])?(\.(\d+))?$", v)
          return (int(m.group(1)), int(m.group(2)), m.group(3) or "", int(m.group(5) or 0))

      # include the currently packaged version so a transient gap in the vendor page
      # (where the latest is momentarily missing) never reports a downgrade
      try:
          with open("PKGBUILD") as f:
              for line in f:
                  if line.startswith("_tagname="):
                      cur = line.split("=", 1)[1].strip().strip('"').strip("'")
                      if re.match(r"^\d+\.\d+[A-Za-z]?(\.\d+)?$", cur):
                          vers.append(cur)
                      break
      except FileNotFoundError:
          pass

      if vers:
          print(max(vers, key=parse))
      PYEOF

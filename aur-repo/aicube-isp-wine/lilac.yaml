maintainers:
  - github: taotieren
    email: admin@taotieren.com

pre_build_script: |
  oldver, oldrel = get_pkgver_and_pkgrel()
  for line in edit_file('PKGBUILD'):
    if line.startswith('_tagname='):
      line = f"_tagname={_G.newver}"
    print(line)
  newver, newrel = get_pkgver_and_pkgrel()
  update_pkgrel(1 if newver != oldver else None)
  run_protected(["updpkgsums"])

post_build_script: |
  git_pkgbuild_commit()
#  update_aur_repo()
update_on:
  - source: regex
    url: https://img.wanwang.xin/pubsf/10287/10287325/cdn-static-pages/pages/pc/1519083_zh-cn.html.Body.js
    regex: 'AiCube-ISP-v([\w\.\-]+)\.zip'
    headers:
      User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
      Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
      Accept-Language: en-US,en;q=0.5
    # include_regex: ".*-*-*"
#   - source: manual
#     manual: 1

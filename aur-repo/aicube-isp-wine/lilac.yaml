maintainers:
  - github: taotieren
    email: admin@taotieren.com

pre_build_script: |
  for line in edit_file('PKGBUILD'):
    if line.startswith('_tagname='):
      line = f"_tagname={_G.newver}"
    print(line)
  # PKGBUILD 中 pkgver=${_tagname//-/+} 会将 - 转 +，故同步处理
  update_pkgver_and_pkgrel(_G.newver.replace('-', '+'))
  run_protected(["updpkgsums"])

post_build_script: |
  git_pkgbuild_commit()
  update_aur_repo()

update_on:
  - source: cmd
    cmd: 'curl -sL --connect-timeout 30 --max-time 60 -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" -H "Referer: https://www.stcai.com/" "https://img.wanwang.xin/pubsf/10287/10287325/cdn-static-pages/pages/pc/1519083_zh-cn.html.Body.js" | grep -o "AiCube-ISP-v[.a-zA-Z0-9_-]*[.]zip" | head -1 | sed "s/AiCube-ISP-v//;s/[.]zip$//"'

maintainers:
  - github: taotieren
    email: admin@taotieren.com

pre_build_script: |
  for line in edit_file('PKGBUILD'):
    if line.startswith('_tagname='):
      line = f"_tagname={_G.newver}"
    print(line)
  # PKGBUILD 中 pkgver=${_tagname//-/+} 会将 - 转 +，故同步处理
  update_pkgver_and_pkgrel(_G.newver.replace('-', '+'))
  run_protected(["updpkgsums"])

post_build_script: |
  git_pkgbuild_commit()
  update_aur_repo()

update_on:
  - source: cmd
    cmd: 'python3 -c "import urllib.request,re;req=urllib.request.Request(\"https://img.wanwang.xin/pubsf/10287/10287325/cdn-static-pages/pages/pc/1519083_zh-cn.html.Body.js\",headers={\"User-Agent\":\"Mozilla/5.0\",\"Referer\":\"https://www.stcai.com/\"});m=re.search(r\"AiCube-ISP-v([\w.\-]+)\.zip\",urllib.request.urlopen(req).read().decode());m and print(m.group(1))"'

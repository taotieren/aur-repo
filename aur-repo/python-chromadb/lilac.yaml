maintainers:
  - github: taotieren
    email: admin@taotieren.com
build_prefix: aur-repo-x86_64
pre_build_script: aur_pre_build(maintainers=['jaintp'])
post_build: aur_post_build
repo_depends:
  - python-chroma-hnswlib
  - python-mmh3
  - python-opentelemetry-instrumentation-fastapi
  - python-posthog
  - python-pybase64
  - python-pypika
  - python-tokenizers
update_on:
  - source: aur
    aur: python-chromadb
  - alias: python

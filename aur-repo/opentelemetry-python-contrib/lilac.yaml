maintainers:
  - github: taotieren
    email: admin@taotieren.com
build_prefix: aur-repo-x86_64
pre_build_script: |
  update_pkgver_and_pkgrel(_G.newver)
  run_protected(["./geninfo.sh"])
  run_protected(["updpkgsums"])
post_build_script: |
  git_pkgbuild_commit()
  update_aur_repo()
# repo_depends:
#   -
update_on:
  - source: github
    github: open-telemetry/opentelemetry-python-contrib
    # use_max_tag: true
    use_latest_release: true
    exclude_regex: "^opentelemetry-resourcedetector-gcp.*"
    prefix: v
  - alias: python

maintainers:
  - github: taotieren
    email: admin@taotieren.com
pre_build_script: |
  oldver, oldrel = get_pkgver_and_pkgrel()
  for line in edit_file('PKGBUILD'):
    if line.startswith('_tagname='):
      line = f"_tagname={_G.newver}"
    print(line)
  newver, newrel = get_pkgver_and_pkgrel()
  update_pkgrel(1 if newver != oldver else None)
  run_protected(["updpkgsums"])

# pre_build_script: |
#   update_pkgver_and_pkgrel(_G.newver)
post_build_script: |
  git_pkgbuild_commit()
  update_aur_repo()
repo_depends:
  - electron-builder
  - zx
update_on:
  - source: github
    github: aleksey-hoffman/sigma-file-manager
    # use_latest_tag: true
    use_max_tag: true
    prefix: v
    # exclude_regex: ".*alpha*"

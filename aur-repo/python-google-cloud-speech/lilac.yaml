maintainers:
  - github: taotieren
    email: admin@taotieren.com
build_prefix: aur-repo-x86_64
pre_build_script: |
  aur_pre_build(maintainers='medaminezghal')
  add_makedepends(['python-cryptography'])
  run_cmd(['curl', '-L', '-o', 'PKGBUILD', 'https://aur.archlinux.org/cgit/aur.git/plain/PKGBUILD?h=python-google-cloud-speech'])

  run_cmd(['sed', '-i', 's/check/_check/', 'PKGBUILD'])

  run_cmd(['updpkgsums'])
post_build: aur_post_build
repo_depends:
  - python-grpcio-status
  - python-proto-plus
update_on:
  - source: aur
    aur: python-google-cloud-speech
  - alias: python

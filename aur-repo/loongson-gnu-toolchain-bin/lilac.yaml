# post_build: aur_post_build
# update_on:
#   - source: aur
#     aur: loongson-gnu-toolchain-bin

maintainers:
  - github: taotieren
    email: admin@taotieren.com
# pre_build_script: |
#   update_pkgver_and_pkgrel(_G.newver)
pre_build_script: |
  oldver, oldrel = get_pkgver_and_pkgrel()
  for line in edit_file('PKGBUILD'):
    if line.startswith('_tagname='):
      line = f"_tagname={_G.newver}"
    print(line)
  newver, newrel = get_pkgver_and_pkgrel()
  update_pkgrel(1 if newver != oldver else None)
  run_protected(["updpkgsums"])
post_build_script: |
  git_pkgbuild_commit()
  update_aur_repo()
# repo_depends:
#   -
update_on:
  - source: regex
    url: https://ftp.loongnix.cn/toolchain/gcc/release/loongarch/gcc8/
    regex: "loongson-gnu-toolchain-[\\w.\\-]+\\.tar.xz"

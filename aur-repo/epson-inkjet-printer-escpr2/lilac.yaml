maintainers:
  - github: taotieren
    email: admin@taotieren.com
pre_build_script: |
  aur_pre_build(maintainers=['AngryUbuntuNerd', 'andit'])
  run_cmd(['curl', '-L', '-o', 'PKGBUILD', 'https://aur.archlinux.org/cgit/aur.git/plain/PKGBUILD?h=epson-inkjet-printer-escpr2'])
  run_cmd(['sed', '-i', 's/$pkgver-$pkgrel/$pkgver-1/', 'PKGBUILD'])
  run_protected(["updpkgsums"])
  
post_build: aur_post_build
update_on:
  - source: aur
    aur: epson-inkjet-printer-escpr2
